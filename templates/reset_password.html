{% extends 'base.html' %}
{% block title %}Restablecer contrasena{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <span class="eyebrow">Nuevo acceso</span>
    <h1 class="auth-title">Cambia tu contrasena</h1>
    <p class="auth-sub">Define una nueva contrasena para volver a entrar a tu cuenta.</p>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Nueva contrasena</label>
        <input type="password" name="password" class="form-input" placeholder="Minimo 6 caracteres" minlength="6" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contrasena</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="Repite tu nueva clave" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem">Actualizar contrasena</button>
    </form>
  </div>
</div>
{% endblock %}
